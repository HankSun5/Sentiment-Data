name: Run Python script every 2 hours

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  run-python-script:
    runs-on: ubuntu-latest

    steps:
    # Step 1: 检出代码
    - name: Checkout code
      uses: actions/checkout@v4   # ✅ 升级

    # Step 2: 设置 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5   # ✅ 升级
      with:
        python-version: '3.11'  # ✅ 建议固定版本（避免不稳定）

    # Step 3: 安装依赖
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Step 4: 运行 Python 脚本
    - name: Run Python script
      run: python crypto_sentiment_etl.py

    # Step 5: 检查是否有文件更改
    - name: Commit changes if any
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add SentimentData/
        git diff --cached --quiet || git commit -m "Update sentiment data"

    # Step 6: 推送更改
    - name: Push changes
      if: success()
      run: git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
